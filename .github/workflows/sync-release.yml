name: Sync Upstream Releases

on:
  workflow_dispatch:  # 手动触发
  schedule:
    - cron: "1 1 * * *"  

jobs:
  sync-releases:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install GitHub CLI
        uses: cli/cli@v2

      - name: Sync releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UPSTREAM: noimank/tvbox   # ← 修改这里成上游仓库名，如: torvalds/linux
          CURRENT: ${{ github.repository }}
        run: |
          echo "Syncing releases from $UPSTREAM to $CURRENT"

          # 获取上游所有 releases 的 tag 列表
          upstream_tags=$(gh release list -R $UPSTREAM --json tagName -q '.[].tagName')

          for tag in $upstream_tags; do
            echo "Processing release tag: $tag"

            # 判断 release 是否已存在
            exists=$(gh release view $tag -R $CURRENT --json tagName -q '.tagName' || echo "")
            if [[ "$exists" == "$tag" ]]; then
              echo "Release $tag already exists, skipping..."
              continue
            fi

            echo "Creating release $tag ..."

            # 下载上游 release assets
            mkdir -p assets
            gh release download $tag -R $UPSTREAM --dir assets

            # 创建发布并上传 assets
            gh release create "$tag" \
              assets/* \
              -R $CURRENT \
              --title "$tag" \
              --notes "Synced from upstream: $UPSTREAM"

            rm -rf assets
          done

          echo "All releases synced!"
